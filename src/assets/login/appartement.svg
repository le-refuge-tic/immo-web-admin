<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260">
  <defs>
    <linearGradient id="a-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="a-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="a-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="380" height="260" fill="url(#a-sky)"/>

  <!-- Clouds -->
  <ellipse cx="55" cy="30" rx="44" ry="17" fill="white" opacity="0.85"/>
  <ellipse cx="72" cy="22" rx="26" ry="14" fill="white"/>
  <ellipse cx="320" cy="36" rx="38" ry="15" fill="white" opacity="0.8"/>
  <ellipse cx="338" cy="28" rx="22" ry="12" fill="white" opacity="0.9"/>

  <!-- Sun -->
  <circle cx="342" cy="22" r="20" fill="#FBBF24"/>
  <circle cx="342" cy="22" r="14" fill="#F59E0B"/>

  <!-- Background building left -->
  <rect x="14" y="90" width="72" height="136" fill="#CBD5E1" rx="3"/>
  <rect x="14" y="90" width="72" height="10" fill="#94A3B8" rx="3 3 0 0"/>
  <!-- Windows bg left -->
  <rect x="22" y="108" width="20" height="16" fill="#93C5FD" rx="2" opacity="0.7"/>
  <rect x="50" y="108" width="20" height="16" fill="white" rx="2" opacity="0.7"/>
  <rect x="22" y="132" width="20" height="16" fill="white" rx="2" opacity="0.7"/>
  <rect x="50" y="132" width="20" height="16" fill="#FCD34D" rx="2" opacity="0.7"/>
  <rect x="22" y="156" width="20" height="16" fill="#93C5FD" rx="2" opacity="0.7"/>
  <rect x="50" y="156" width="20" height="16" fill="white" rx="2" opacity="0.7"/>
  <rect x="22" y="180" width="20" height="16" fill="#FCD34D" rx="2" opacity="0.7"/>
  <rect x="50" y="180" width="20" height="16" fill="#93C5FD" rx="2" opacity="0.7"/>
  <!-- Door bg left -->
  <rect x="32" y="208" width="24" height="18" fill="#64748B" rx="2"/>

  <!-- Background building right -->
  <rect x="294" y="100" width="72" height="126" fill="#CBD5E1" rx="3"/>
  <rect x="294" y="100" width="72" height="10" fill="#94A3B8" rx="3 3 0 0"/>
  <!-- Windows bg right -->
  <rect x="302" y="118" width="20" height="16" fill="#FCD34D" rx="2" opacity="0.7"/>
  <rect x="330" y="118" width="20" height="16" fill="#93C5FD" rx="2" opacity="0.7"/>
  <rect x="302" y="142" width="20" height="16" fill="white" rx="2" opacity="0.7"/>
  <rect x="330" y="142" width="20" height="16" fill="#93C5FD" rx="2" opacity="0.7"/>
  <rect x="302" y="166" width="20" height="16" fill="#93C5FD" rx="2" opacity="0.7"/>
  <rect x="330" y="166" width="20" height="16" fill="white" rx="2" opacity="0.7"/>
  <!-- Door bg right -->
  <rect x="318" y="208" width="24" height="18" fill="#64748B" rx="2"/>

  <!-- Main building -->
  <rect x="100" y="24" width="180" height="202" fill="url(#a-main)" rx="4"/>

  <!-- Rooftop bar -->
  <rect x="100" y="24" width="180" height="14" fill="#1E3A8A" rx="4 4 0 0"/>

  <!-- Rooftop structures -->
  <rect x="126" y="10" width="30" height="17" fill="#1E3A8A" rx="3"/>
  <rect x="224" y="14" width="24" height="13" fill="#1E3A8A" rx="2"/>
  <!-- Antenna -->
  <line x1="141" y1="10" x2="141" y2="0" stroke="#64748B" stroke-width="2.5"/>
  <circle cx="141" cy="0" r="3.5" fill="#EF4444"/>
  <line x1="236" y1="14" x2="236" y2="6" stroke="#64748B" stroke-width="2"/>
  <circle cx="236" cy="5" r="2.5" fill="#FCD34D"/>

  <!-- Windows grid main building -->
  <!-- Floor 1 -->
  <rect x="114" y="48" width="32" height="26" fill="url(#a-glass)" rx="3"/>
  <rect x="174" y="48" width="32" height="26" fill="white" rx="3"/>
  <rect x="234" y="48" width="32" height="26" fill="url(#a-glass)" rx="3"/>
  <!-- Window reflections -->
  <polygon points="117,50 124,50 117,60" fill="white" opacity="0.5"/>
  <polygon points="237,50 244,50 237,60" fill="white" opacity="0.5"/>

  <!-- Floor 2 -->
  <rect x="114" y="84" width="32" height="26" fill="white" rx="3"/>
  <rect x="174" y="84" width="32" height="26" fill="url(#a-glass)" rx="3"/>
  <rect x="234" y="84" width="32" height="26" fill="#FCD34D" rx="3"/>
  <polygon points="177,86 184,86 177,96" fill="white" opacity="0.5"/>

  <!-- Balcony floor 2 -->
  <rect x="108" y="110" width="44" height="5" fill="#94A3B8"/>
  <line x1="108" y1="110" x2="108" y2="84" stroke="#94A3B8" stroke-width="2"/>
  <line x1="152" y1="110" x2="152" y2="84" stroke="#94A3B8" stroke-width="2"/>

  <!-- Floor 3 -->
  <rect x="114" y="124" width="32" height="26" fill="url(#a-glass)" rx="3"/>
  <rect x="174" y="124" width="32" height="26" fill="white" rx="3"/>
  <rect x="234" y="124" width="32" height="26" fill="url(#a-glass)" rx="3"/>

  <!-- Balcony floor 3 -->
  <rect x="168" y="150" width="44" height="5" fill="#94A3B8"/>
  <line x1="168" y1="150" x2="168" y2="124" stroke="#94A3B8" stroke-width="2"/>
  <line x1="212" y1="150" x2="212" y2="124" stroke="#94A3B8" stroke-width="2"/>

  <!-- Floor 4 -->
  <rect x="114" y="164" width="32" height="26" fill="#FCD34D" rx="3"/>
  <rect x="174" y="164" width="32" height="26" fill="url(#a-glass)" rx="3"/>
  <rect x="234" y="164" width="32" height="26" fill="white" rx="3"/>
  <polygon points="177,166 184,166 177,176" fill="white" opacity="0.5"/>

  <!-- Building entrance -->
  <rect x="148" y="192" width="84" height="34" fill="#1E3A8A" rx="3"/>
  <!-- Entry doors -->
  <rect x="158" y="200" width="26" height="26" fill="#2563EB" rx="2"/>
  <rect x="196" y="200" width="26" height="26" fill="#2563EB" rx="2"/>
  <circle cx="184" cy="213" r="3" fill="#FCD34D"/>
  <circle cx="222" cy="213" r="3" fill="#FCD34D"/>
  <!-- Entry awning -->
  <polygon points="144,192 236,192 240,184 140,184" fill="#1E40AF" opacity="0.85"/>

  <!-- Ground / Sidewalk -->
  <rect y="224" width="380" height="36" fill="#E5E7EB"/>
  <rect y="228" width="380" height="18" fill="#D1D5DB"/>
  <!-- Road -->
  <rect y="246" width="380" height="14" fill="#9CA3AF"/>
  <line x1="0" y1="253" x2="380" y2="253" stroke="#FEF08A" stroke-width="2" stroke-dasharray="22,14"/>

  <!-- Sidewalk trees -->
  <rect x="96" y="218" width="7" height="10" fill="#92400E" rx="2"/>
  <circle cx="99" cy="212" r="14" fill="#22C55E"/>
  <rect x="278" y="218" width="7" height="10" fill="#92400E" rx="2"/>
  <circle cx="281" cy="212" r="14" fill="#4ADE80"/>

  <!-- Street lamp -->
  <line x1="60" y1="224" x2="60" y2="190" stroke="#64748B" stroke-width="3"/>
  <path d="M60,190 Q60,180 72,180" fill="none" stroke="#64748B" stroke-width="3"/>
  <circle cx="72" cy="180" r="5" fill="#FEF08A"/>
  <line x1="330" y1="224" x2="330" y2="190" stroke="#64748B" stroke-width="3"/>
  <path d="M330,190 Q330,180 318,180" fill="none" stroke="#64748B" stroke-width="3"/>
  <circle cx="318" cy="180" r="5" fill="#FEF08A"/>
</svg>
