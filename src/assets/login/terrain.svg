<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260">
  <defs>
    <linearGradient id="t-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BBF7D0"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="t-land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCFCE7"/>
      <stop offset="100%" stop-color="#BBF7D0"/>
    </linearGradient>
    <linearGradient id="t-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
  </defs>

  <!-- Sky / backdrop -->
  <rect width="380" height="260" fill="url(#t-sky)"/>

  <!-- Rolling hills background -->
  <ellipse cx="80" cy="140" rx="130" ry="55" fill="#A7F3D0" opacity="0.6"/>
  <ellipse cx="310" cy="148" rx="120" ry="48" fill="#86EFAC" opacity="0.55"/>
  <ellipse cx="190" cy="155" rx="200" ry="40" fill="#A7F3D0" opacity="0.4"/>

  <!-- Clouds -->
  <ellipse cx="70" cy="32" rx="44" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="88" cy="24" rx="26" ry="14" fill="white" opacity="0.9"/>
  <ellipse cx="52" cy="36" rx="20" ry="12" fill="white" opacity="0.75"/>
  <ellipse cx="290" cy="38" rx="40" ry="16" fill="white" opacity="0.75"/>
  <ellipse cx="308" cy="30" rx="24" ry="12" fill="white" opacity="0.85"/>

  <!-- Sun -->
  <circle cx="350" cy="30" r="22" fill="#FBBF24"/>
  <circle cx="350" cy="30" r="15" fill="#F59E0B"/>

  <!-- Main land plot -->
  <polygon points="28,84 352,84 368,198 12,198" fill="url(#t-land)"/>

  <!-- Inner land texture lines (gentle) -->
  <line x1="70" y1="120" x2="310" y2="120" stroke="#86EFAC" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="155" x2="330" y2="155" stroke="#86EFAC" stroke-width="1" opacity="0.6"/>

  <!-- ── FENCE SYSTEM ── -->
  <!-- Top fence rail -->
  <line x1="28" y1="84" x2="352" y2="84" stroke="#92400E" stroke-width="3.5"/>
  <!-- Bottom fence rail -->
  <line x1="12" y1="198" x2="368" y2="198" stroke="#92400E" stroke-width="3.5"/>
  <!-- Left fence rail -->
  <line x1="28" y1="84" x2="12" y2="198" stroke="#92400E" stroke-width="3"/>
  <!-- Right fence rail -->
  <line x1="352" y1="84" x2="368" y2="198" stroke="#92400E" stroke-width="3"/>

  <!-- Top fence posts -->
  <rect x="24" y="75" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="82" y="75" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="140" y="75" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="198" y="75" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="256" y="75" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="314" y="75" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="348" y="75" width="8" height="20" fill="#78350F" rx="2"/>

  <!-- Bottom fence posts -->
  <rect x="8" y="190" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="70" y="190" width="8" height="20" fill="#78350F" rx="2"/>
  <!-- Gate gap at center bottom -->
  <rect x="156" y="190" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="218" y="190" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="290" y="190" width="8" height="20" fill="#78350F" rx="2"/>
  <rect x="362" y="190" width="8" height="20" fill="#78350F" rx="2"/>

  <!-- Gate opening (cleared segment) -->
  <rect x="158" y="196" width="66" height="8" fill="url(#t-land)"/>

  <!-- Gate pillars -->
  <rect x="152" y="182" width="12" height="22" fill="#78350F" rx="3"/>
  <rect x="218" y="182" width="12" height="22" fill="#78350F" rx="3"/>
  <!-- Gate arch -->
  <path d="M164,197 L164,178 Q190,162 218,178 L218,197" fill="none" stroke="#78350F" stroke-width="3"/>
  <!-- Gate bars -->
  <line x1="172" y1="197" x2="172" y2="180" stroke="#92400E" stroke-width="2"/>
  <line x1="182" y1="197" x2="182" y2="175" stroke="#92400E" stroke-width="2"/>
  <line x1="190" y1="197" x2="190" y2="172" stroke="#92400E" stroke-width="2"/>
  <line x1="198" y1="197" x2="198" y2="175" stroke="#92400E" stroke-width="2"/>
  <line x1="208" y1="197" x2="208" y2="180" stroke="#92400E" stroke-width="2"/>

  <!-- Corner survey markers -->
  <circle cx="28" cy="84" r="6" fill="#EF4444" stroke="white" stroke-width="1.5"/>
  <circle cx="352" cy="84" r="6" fill="#EF4444" stroke="white" stroke-width="1.5"/>
  <circle cx="12" cy="198" r="6" fill="#EF4444" stroke="white" stroke-width="1.5"/>
  <circle cx="368" cy="198" r="6" fill="#EF4444" stroke="white" stroke-width="1.5"/>

  <!-- Measurement dimension line horizontal -->
  <line x1="44" y1="136" x2="336" y2="136" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="38,131 38,141 26,136" fill="#EF4444"/>
  <polygon points="342,131 342,141 354,136" fill="#EF4444"/>
  <!-- Measurement label -->
  <rect x="158" y="127" width="64" height="20" fill="white" rx="5"/>
  <text x="190" y="141" font-family="sans-serif" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="700">45 × 25 m</text>

  <!-- Area label badge -->
  <rect x="146" y="100" width="88" height="24" fill="white" rx="6" opacity="0.92"/>
  <text x="190" y="116" font-family="sans-serif" font-size="12" fill="#16A34A" text-anchor="middle" font-weight="800">1 125 m²</text>

  <!-- Trees at back of plot -->
  <circle cx="55" cy="82" r="18" fill="#22C55E"/>
  <rect x="52" y="82" width="8" height="12" fill="#92400E"/>
  <circle cx="45" cy="88" r="10" fill="#4ADE80"/>
  <circle cx="68" cy="86" r="12" fill="#16A34A"/>

  <circle cx="326" cy="80" r="20" fill="#4ADE80"/>
  <rect x="323" y="80" width="8" height="14" fill="#92400E"/>
  <circle cx="314" cy="87" r="12" fill="#22C55E"/>
  <circle cx="340" cy="85" r="13" fill="#16A34A"/>

  <!-- Side trees -->
  <circle cx="20" cy="140" r="14" fill="#22C55E" opacity="0.8"/>
  <circle cx="362" cy="140" r="14" fill="#4ADE80" opacity="0.8"/>

  <!-- Road in front -->
  <rect y="210" width="380" height="50" fill="url(#t-road)"/>
  <rect y="220" width="380" height="22" fill="#D1D5DB"/>
  <rect y="242" width="380" height="18" fill="#9CA3AF"/>
  <!-- Road center line -->
  <line x1="0" y1="251" x2="380" y2="251" stroke="#FEF08A" stroke-width="2" stroke-dasharray="24,16"/>

  <!-- Road signpost -->
  <line x1="34" y1="208" x2="34" y2="186" stroke="#64748B" stroke-width="3"/>
  <rect x="20" y="180" width="40" height="16" fill="#F97316" rx="3"/>
  <text x="40" y="191" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">À VENDRE</text>
</svg>
