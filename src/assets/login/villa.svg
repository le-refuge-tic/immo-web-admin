<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 270">
  <defs>
    <linearGradient id="v-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="v-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="v-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="v-pool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="270" fill="url(#v-sky)"/>

  <!-- Clouds -->
  <ellipse cx="68" cy="38" rx="48" ry="19" fill="white" opacity="0.9"/>
  <ellipse cx="90" cy="30" rx="30" ry="16" fill="white"/>
  <ellipse cx="46" cy="43" rx="22" ry="13" fill="white" opacity="0.85"/>
  <ellipse cx="300" cy="48" rx="40" ry="16" fill="white" opacity="0.8"/>
  <ellipse cx="318" cy="40" rx="24" ry="13" fill="white" opacity="0.9"/>

  <!-- Sun -->
  <circle cx="355" cy="32" r="26" fill="#FBBF24"/>
  <circle cx="355" cy="32" r="19" fill="#F59E0B"/>

  <!-- Ground -->
  <rect y="178" width="400" height="92" fill="url(#v-grass)"/>

  <!-- Driveway path -->
  <polygon points="158,270 242,270 220,178 180,178" fill="#D4A760" opacity="0.75"/>
  <line x1="200" y1="270" x2="200" y2="178" stroke="#C49040" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Garage wing -->
  <rect x="228" y="138" width="112" height="60" fill="#F1F5F9"/>
  <rect x="238" y="146" width="92" height="48" fill="#CBD5E1" rx="2"/>
  <line x1="238" y1="162" x2="330" y2="162" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="238" y1="178" x2="330" y2="178" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="284" y1="146" x2="284" y2="194" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="224" y="131" width="120" height="10" fill="#1E3A8A" rx="2"/>

  <!-- Main house body -->
  <rect x="52" y="104" width="186" height="96" fill="url(#v-wall)" rx="2"/>

  <!-- Facade columns -->
  <rect x="70" y="104" width="11" height="96" fill="#E2E8F0"/>
  <rect x="207" y="104" width="11" height="96" fill="#E2E8F0"/>

  <!-- Left window -->
  <rect x="84" y="118" width="52" height="40" fill="#93C5FD" rx="3"/>
  <line x1="110" y1="118" x2="110" y2="158" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="84" y1="138" x2="136" y2="138" stroke="#60A5FA" stroke-width="1.5"/>
  <rect x="84" y="118" width="52" height="40" fill="none" stroke="#BFDBFE" stroke-width="1" rx="3"/>
  <!-- Window reflection -->
  <polygon points="88,120 96,120 88,132" fill="white" opacity="0.4"/>

  <!-- Right window -->
  <rect x="152" y="118" width="52" height="40" fill="#93C5FD" rx="3"/>
  <line x1="178" y1="118" x2="178" y2="158" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="152" y1="138" x2="204" y2="138" stroke="#60A5FA" stroke-width="1.5"/>
  <rect x="152" y="118" width="52" height="40" fill="none" stroke="#BFDBFE" stroke-width="1" rx="3"/>
  <polygon points="156,120 164,120 156,132" fill="white" opacity="0.4"/>

  <!-- Door (arched) -->
  <rect x="128" y="164" width="40" height="36" fill="#1E3A8A" rx="20 20 0 0"/>
  <circle cx="142" cy="183" r="3.5" fill="#FCD34D"/>
  <!-- Door frame -->
  <rect x="126" y="162" width="44" height="40" fill="none" stroke="#2563EB" stroke-width="1.5" rx="22 22 0 0"/>

  <!-- Roof hip style -->
  <polygon points="34,104 145,50 256,104" fill="#1E3A8A"/>
  <polygon points="34,104 62,90 62,104" fill="#1E40AF"/>
  <polygon points="256,104 228,90 228,104" fill="#1E40AF"/>
  <!-- Roof ridge highlight -->
  <line x1="110" y1="70" x2="180" y2="70" stroke="#2563EB" stroke-width="2" opacity="0.5"/>

  <!-- Chimney -->
  <rect x="200" y="56" width="18" height="42" fill="#94A3B8"/>
  <rect x="196" y="52" width="26" height="8" fill="#64748B" rx="1"/>
  <!-- Smoke -->
  <circle cx="209" cy="43" r="8" fill="#E2E8F0" opacity="0.6"/>
  <circle cx="214" cy="34" r="6" fill="#E2E8F0" opacity="0.4"/>
  <circle cx="208" cy="26" r="5" fill="#E2E8F0" opacity="0.25"/>

  <!-- Swimming pool -->
  <rect x="60" y="196" width="104" height="40" fill="url(#v-pool)" rx="7"/>
  <path d="M70,207 Q82,200 98,207 Q114,214 130,207 Q146,200 158,207" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>
  <path d="M70,220 Q82,213 98,220 Q114,227 130,220 Q146,213 158,220" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>
  <rect x="60" y="196" width="15" height="16" fill="#60A5FA" rx="3"/>

  <!-- Left tree group -->
  <rect x="18" y="158" width="10" height="30" fill="#92400E" rx="3"/>
  <circle cx="23" cy="148" r="24" fill="#22C55E"/>
  <circle cx="10" cy="158" r="15" fill="#4ADE80"/>
  <circle cx="38" cy="156" r="15" fill="#16A34A"/>

  <!-- Right tree -->
  <rect x="340" y="164" width="9" height="25" fill="#92400E" rx="3"/>
  <circle cx="344" cy="155" r="22" fill="#4ADE80"/>
  <circle cx="330" cy="163" r="13" fill="#22C55E"/>
  <circle cx="358" cy="161" r="13" fill="#16A34A"/>

  <!-- Garden bushes -->
  <circle cx="60" cy="194" r="14" fill="#22C55E"/>
  <circle cx="248" cy="196" r="14" fill="#4ADE80"/>
  <circle cx="270" cy="198" r="10" fill="#22C55E"/>

  <!-- Small path lighting -->
  <circle cx="175" cy="222" r="4" fill="#FCD34D" opacity="0.8"/>
  <circle cx="175" cy="248" r="4" fill="#FCD34D" opacity="0.8"/>
</svg>
